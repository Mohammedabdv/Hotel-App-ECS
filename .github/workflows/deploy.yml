name: Test, Build and Deploy to ECS

# Triggers the workflow when changes are pushed to the main branch
on:
  push:
    branches:
      - main
      
  pull_request:
    branches: 
      - main

env:
  AWS_REGION:     us-east-1
  ECR_REPOSITORY: my-app-repo # Defines the ECR repository name for storing Docker images
  ECS_CLUSTER:    my-app-cluster # Specifies the ECS cluster where the app will run
  ECS_SERVICE:    my-app-service # Defines the ECS service responsible for running containers
  CONTAINER_NAME: my-app-container # Specifies the container name in the ECS task definition
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Forces GitHub Actions to use Node.js 24 for compatibility

jobs:
  # 1- Test Stage ──────────────────────────────────
  test:
    runs-on: ubuntu-latest # Runs the job on the latest Ubuntu runner

    # Runs a temporary MySQL container as a service for testing
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: hotel_app
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: laravel
          MYSQL_PASSWORD: laravel
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3 # Waits until MySQL is ready

    steps:
       # Defines the sequence of steps to execute
      - name: Checkout code
        uses: actions/checkout@v4 # Pulls the repository code into the runner

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with: # Passes configuration inputs to the action
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, bcmath, gd, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Configure test database
        run: |
          echo "DB_CONNECTION=mysql"      >> .env
          echo "DB_HOST=127.0.0.1"        >> .env
          echo "DB_PORT=3306"             >> .env
          echo "DB_DATABASE=hotel_app"    >> .env
          echo "DB_USERNAME=laravel"      >> .env
          echo "DB_PASSWORD=laravel"      >> .env
          echo "BROADCAST_DRIVER=log"     >> .env
          echo "CACHE_DRIVER=array"       >> .env
          echo "SESSION_DRIVER=array"     >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  # 2- Build Stage ────────────────────────────────
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test   # Ensures this job runs only after the 'test' job completes successfully
    outputs:
      image: ${{ steps.build-image.outputs.image }} # Exposes the built Docker image reference from this job so it can be used by other jobs (e.g., deploy)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials # Authenticates the workflow with AWS using credentials stored in GitHub Secrets
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }} 
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Authenticate with Amazon ECR (Elastic Container Registry)
      - name: Login to Amazon ECR
        id: login-ecr # Give this step an ID so we can reference its outputs later
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Docker image, tag it, and push it to ECR
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }} # Grab the registry URL from the previous step's output
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG . 
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

        # 1- Build the Docker image and tag it with the commit SHA → for traceability, so we can roll back to any previous build
        # 2- Also tag the image as 'latest'  → always points to the newest build used by deployments as a default
        # 3- Push both tags to ECR
        # 4- Save the full image URI as a step output so later jobs/steps can reference it, e.g. to deploy this exact image to ECS or Kubernetes

  # 3- Deploy Stage ───────────────────────────────
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build    # Ensures this job runs only after the 'build' job completes successfully

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

        # Tell ECS to restart the service with the latest image from ECR.
        # --force-new-deployment ensures new tasks are launched even if the task definition hasn't changed.
        # ECS will spin up new containers first, confirm they're healthy, then shut down the old ones (rolling update).
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Run Migrations and Seeders
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition my-app-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$(aws ec2 describe-subnets --filters Name=tag:Name,Values=Private_Subnet_1 --query 'Subnets[0].SubnetId' --output text)],securityGroups=[$(aws ec2 describe-security-groups --filters Name=group-name,Values=ecs-sg --query 'SecurityGroups[0].GroupId' --output text)],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"my-app-container","command":["sh","-c","php artisan migrate --force && php artisan db:seed --force"]}]}' \
            --region ${{ env.AWS_REGION }}

        # 1- Runs a one-off task in ECS instead of using the long-running service (because migrations are not continuous processes)
        # 2- Specifies the ECS cluster where the task will run (to target the correct environment where the app is deployed)
        # 3- Uses the predefined task definition (because it already contains container config, image, CPU, memory, etc.)
        # 4- Uses serverless Fargate
        # 5- Configures the network settings to run in the private subnets with the correct security group
        # 6- Overrides the default container command to run migrations and seeders
      - name: Deployment success
        run: echo "✅ Deployment completed successfully!"